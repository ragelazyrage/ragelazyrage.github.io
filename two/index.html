<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photo</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: #0a0a0a;
  }
  .wrap {
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
  .wrap img {
    max-width: 100%;
    max-height: 100svh;
    width: auto;
    height: auto;
    display: block;
    border-radius: 8px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <img src="photo.png" alt="photo">
  </div>
</body>
</html>
